name: API CI

on:
    pull_request:
        paths:
            - services/api/**
            - .github/workflows/ci-api.yml
    push:
        branches: [main]
        paths:
            - services/api/**
            - .github/workflows/ci-api.yml
    workflow_dispatch:

jobs:
    api-ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Detect API service
              id: check
              shell: bash
              run: |
                  if [ -d "services/api" ]; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "::notice::services/api not found, skipping API CI."
                  fi

            - name: Setup Python
              if: steps.check.outputs.exists == 'true'
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install dependencies
              if: steps.check.outputs.exists == 'true'
              working-directory: services/api
              shell: bash
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements-dev.txt ]; then
                    pip install -r requirements-dev.txt
                  elif [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                  elif [ -f pyproject.toml ]; then
                    pip install -e ".[dev]" || pip install -e .
                  else
                    echo "::warning::No Python dependency file found."
                  fi

            - name: Lint ruff
              if: steps.check.outputs.exists == 'true'
              working-directory: services/api
              shell: bash
              run: |
                  if command -v ruff >/dev/null 2>&1; then
                    ruff check .
                  else
                    echo "::notice::ruff not installed, skipping lint step."
                  fi

            - name: Typecheck mypy
              if: steps.check.outputs.exists == 'true'
              working-directory: services/api
              shell: bash
              run: |
                  if command -v mypy >/dev/null 2>&1; then
                    mypy .
                  else
                    echo "::notice::mypy not installed, skipping typecheck step."
                  fi

            - name: Test
              if: steps.check.outputs.exists == 'true'
              working-directory: services/api
              shell: bash
              run: |
                  if [ -d tests ]; then
                    if command -v pytest >/dev/null 2>&1; then
                      pytest -q
                    else
                      echo "::notice::pytest not installed, skipping tests."
                    fi
                  else
                    echo "::notice::No tests directory found, skipping tests."
                  fi
